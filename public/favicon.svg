<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="z" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Top bar -->
  <rect x="10" y="12" width="28" height="5" rx="2.5" fill="url(#z)"/>
  <!-- Middle bar -->
  <rect x="10" y="21.5" width="20" height="5" rx="2.5" fill="url(#z)" opacity="0.7"/>
  <!-- Bottom bar -->
  <rect x="10" y="31" width="28" height="5" rx="2.5" fill="url(#z)"/>
  <!-- Diagonal slash -->
  <line x1="35" y1="12" x2="13" y2="36" stroke="url(#z)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Diamond spark -->
  <polygon points="42,8 44,12 42,16 40,12" fill="#fb923c" opacity="0.9"/>
</svg>
